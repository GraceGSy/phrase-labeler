services:
  - type: web
    name: phrase-labeler
    env: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
